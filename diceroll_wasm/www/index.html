<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>diceroll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica:ital@0;1&display=swap"
    />
    <style>
      :root {
        --bg: #14171f;
        --bg-elev: #1b1f2a;
        --fg: #e8e3d3;
        --muted: #8a93a6;
        --rule: #2a2f3d;
        --accent: #c9a96e;
        --nat-max: #b8d989;
        --nat-1: #c44d3a;
      }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 1rem 1.25rem 0.75rem;
        border-bottom: 1px solid var(--rule);
      }
      header h1 {
        margin: 0;
        font-family: "IM Fell DW Pica", Georgia, "Times New Roman", serif;
        font-weight: 400;
        font-style: italic;
        font-size: 1.6rem;
        letter-spacing: 0.01em;
        color: var(--fg);
      }
      header .hint {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: 0.4rem;
      }
      header code {
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.85em;
      }

      #terminal {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 1.25rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .line {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .line + .line {
        margin-top: 0.15rem;
      }
      .echo {
        margin-top: 0.5rem;
      }
      .echo:first-child {
        margin-top: 0;
      }
      .prompt {
        color: var(--accent);
      }
      .error {
        color: var(--nat-1);
      }
      .nat-max {
        color: var(--nat-max);
      }
      .nat-1 {
        color: var(--nat-1);
      }

      #input-row {
        display: flex;
        align-items: baseline;
        padding: 0.6rem 1.25rem 1rem;
        border-top: 1px solid var(--rule);
        background: var(--bg-elev);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        box-shadow: inset 2px 0 0 transparent;
        transition: box-shadow 0.12s ease;
      }
      #input-row:focus-within {
        box-shadow: inset 2px 0 0 var(--accent);
      }
      #input-row .prompt {
        padding-right: 0.5rem;
      }
      #input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--fg);
        font: inherit;
        caret-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>diceroll</h1>
      <div class="hint">
        Type a dice expression (e.g. <code>2d6+3</code>) and press Enter. Prefix with
        <code>stats</code> for statistics (e.g. <code>stats 4d6+3</code>). <code>↑/↓</code>
        for history, <code>clear</code> to reset.
      </div>
    </header>
    <div
      id="terminal"
      role="log"
      aria-live="polite"
      aria-relevant="additions"
      aria-label="Roll transcript"
    ></div>
    <div id="input-row">
      <span class="prompt" aria-hidden="true">&gt;&gt;&gt;</span>
      <input
        id="input"
        type="text"
        aria-label="Dice expression"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        autofocus
      />
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
