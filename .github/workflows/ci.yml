name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: format, lint, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --locked --lib --bins --examples --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs-on: ubuntu-latest
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
          - name: macos-arm64
            runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --locked --release

      - name: Smoke test
        shell: bash
        run: |
          ./target/release/diceroll --help
          ./target/release/diceroll d20

      - name: Package binary
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          mkdir -p release
          cp target/release/diceroll "release/diceroll-${{ github.ref_name }}-${{ matrix.name }}"

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: diceroll-${{ matrix.name }}
          path: release/diceroll-${{ github.ref_name }}-${{ matrix.name }}
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
